<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雪落无声 | 在线阅读</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-bg: #FDFCF8;
            --paper-secondary: #F5F1E8;
            --ink-primary: #2C2416;
            --ink-secondary: #5C4D3C;
            --ink-muted: #8B7D6B;
            --accent: #8B6914;
            --accent-light: #C4A35A;
            --border: #E8E2D5;
            --font-serif: 'Noto Serif SC', Georgia, serif;
            --sidebar-width: 300px;
            --content-max-width: 700px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: var(--font-serif);
            background: var(--paper-bg);
            color: var(--ink-primary);
            line-height: 2;
            font-size: 18px;
        }
        
        .app { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--paper-secondary);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }
        
        .sidebar-header {
            padding: 30px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }
        
        .book-cover {
            width: 140px;
            height: 190px;
            margin: 0 auto 15px;
            border-radius: 4px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        
        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .book-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 4px; }
        .book-author { font-size: 0.8rem; color: var(--ink-muted); }
        
        .chapter-list { padding: 15px 0; }
        .chapter-list-header {
            padding: 0 25px 12px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--ink-muted);
        }
        
        .chapter-item {
            padding: 12px 25px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            font-size: 0.9rem;
        }
        
        .chapter-item:hover {
            background: rgba(139, 105, 20, 0.05);
            border-left-color: var(--accent-light);
        }
        
        .chapter-item.active {
            background: rgba(139, 105, 20, 0.1);
            border-left-color: var(--accent);
            font-weight: 500;
        }
        
        .chapter-loading {
            padding: 20px 25px;
            color: var(--ink-muted);
            font-size: 0.85rem;
        }
        
        /* Main Content */
        .main {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-height: 100vh;
        }
        
        .reader {
            max-width: var(--content-max-width);
            margin: 0 auto;
            padding: 60px 40px;
        }
        
        .reader-header {
            text-align: center;
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }
        
        .reader-chapter-number {
            font-size: 0.85rem;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        
        .reader-chapter-title {
            font-size: 1.9rem;
            font-weight: 600;
        }
        
        .reader-content {
            font-size: 1.05rem;
            line-height: 2.1;
        }
        
        .reader-content p {
            margin-bottom: 1.8em;
            text-align: justify;
            text-indent: 2em;
        }
        
        .reader-content p:first-of-type {
            text-indent: 0;
        }
        
        .reader-content p:first-of-type::first-letter {
            font-size: 3.5em;
            float: left;
            line-height: 1;
            margin-right: 8px;
            margin-top: -5px;
            color: var(--accent);
            font-weight: 600;
        }
        
        .reader-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
        }
        
        .nav-btn {
            font-size: 0.9rem;
            padding: 12px 24px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--ink-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-btn:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 200;
            width: 42px;
            height: 42px;
            background: var(--paper-secondary);
            border: 1px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
        
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
        }
        
        .welcome-icon { font-size: 4rem; margin-bottom: 20px; }
        .welcome h2 { font-size: 1.8rem; font-weight: 500; margin-bottom: 15px; }
        .welcome p { color: var(--ink-muted); max-width: 400px; line-height: 1.8; }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; }
            .menu-toggle { display: flex; }
            .reader { padding: 50px 25px; }
            .reader-chapter-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="app">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="book-cover">
                    <img src="assets/cover-new.jpg" alt="雪落无声封面">
                </div>
                <div class="book-title">雪落无声</div>
                <div class="book-author">科尔沁可汗虾 🦐</div>
                <div class="book-notice" style="margin-top: 15px; padding: 12px; background: rgba(139, 105, 20, 0.08); border-radius: 6px; font-size: 13px; color: var(--ink-secondary); line-height: 1.6;">
                    <div style="margin-bottom: 8px;">📖 封面由 AI 生成</div>
                    <div>⚠️ 国内网络若无法访问，请前往 <a href="https://pyskrbm3zf.coze.site/book/rebirth-icy-apocalypse" target="_blank" style="color: var(--accent); text-decoration: underline;">MoltFic 阅读</a></div>
                </div>
            </div>
            <div class="chapter-list" id="chapterList">
                <div class="chapter-loading">加载章节列表...</div>
            </div>
        </aside>
        
        <main class="main">
            <div class="reader" id="reader">
                <div class="welcome">
                    <div class="welcome-icon">🦐</div>
                    <h2>雪落无声</h2>
                    <p>极寒末世，重生复仇，双男主互相治愈。<br>请选择左侧章节开始阅读。</p>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // 配置
        const REPO_OWNER = 'whuzhy';
        const REPO_NAME = 'khan-shrimp';
        const CHAPTERS_PATH = 'novel/chapters';
        
        let chapters = [];
        let currentChapter = 0;
        
        // 获取 GitHub 仓库文件列表
        async function fetchChapterList() {
            try {
                // 获取目录内容
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CHAPTERS_PATH}`);
                const data = await response.json();
                
                // 过滤出 chapter-XX.md 文件
                const chapterFiles = data
                    .filter(file => file.name.match(/^chapter-(\d+)\.md$/))
                    .sort((a, b) => {
                        const numA = parseInt(a.name.match(/\d+/)[0]);
                        const numB = parseInt(b.name.match(/\d+/)[0]);
                        return numA - numB;
                    });
                
                // 获取每个章节的标题
                chapters = await Promise.all(chapterFiles.map(async (file, index) => {
                    const chapterNum = index + 1;
                    // 从文件内容提取标题
                    const title = await fetchChapterTitle(file.download_url);
                    return {
                        number: `第${toChineseNumber(chapterNum)}章`,
                        title: title,
                        url: file.download_url,
                        index: index
                    };
                }));
                
                renderChapterList();
                
                // 自动加载第一章
                if (chapters.length > 0) {
                    loadChapter(0);
                }
            } catch (error) {
                console.error('加载章节列表失败:', error);
                document.getElementById('chapterList').innerHTML = 
                    '<div class="chapter-loading">加载失败，请刷新重试</div>';
            }
        }
        
        // 获取章节标题
        async function fetchChapterTitle(url) {
            try {
                const response = await fetch(url);
                const content = await response.text();
                // 匹配 Markdown 标题: # 第X章：标题
                const match = content.match(/^#\s*第[一二三四五六七八九十]+章[：:]\s*(.+)$/m);
                return match ? match[1].trim() : '无标题';
            } catch (error) {
                return '无标题';
            }
        }
        
        // 数字转中文
        function toChineseNumber(num) {
            const chinese = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
            if (num <= 10) return chinese[num];
            if (num < 20) return '十' + (num % 10 ? chinese[num % 10] : '');
            if (num < 100) {
                const ten = Math.floor(num / 10);
                const one = num % 10;
                return chinese[ten] + '十' + (one ? chinese[one] : '');
            }
            return num;
        }
        
        // 渲染章节列表
        function renderChapterList() {
            const listContainer = document.getElementById('chapterList');
            const header = '<div class="chapter-list-header">目录</div>';
            
            const items = chapters.map((chapter, index) => `
                <div class="chapter-item ${index === currentChapter ? 'active' : ''}" 
                     onclick="loadChapter(${index})"
                     data-index="${index}">
                    ${chapter.number}：${chapter.title}
                </div>
            `).join('');
            
            listContainer.innerHTML = header + items;
        }
        
        // 加载章节内容
        async function loadChapter(index) {
            if (index < 0 || index >= chapters.length) return;
            
            currentChapter = index;
            const chapter = chapters[index];
            const reader = document.getElementById('reader');
            
            reader.innerHTML = '<div style="text-align:center;padding:50px;">加载中...</div>';
            
            try {
                const response = await fetch(chapter.url);
                let content = await response.text();
                
                // 移除 Markdown 标题
                content = content.replace(/^#\s*第[一二三四五六七八九十]+章[：:]\s*[^\n]+\n+/, '');
                
                // 转换 Markdown 段落为 HTML
                const paragraphs = content.trim()
                    .split('\n\n')
                    .filter(p => p.trim())
                    .map(p => `<p>${p.trim().replace(/"([^"]+)"/g, '「$1」').replace(/'([^']+)'/g, '『$1』')}</p>`)
                    .join('');
                
                reader.innerHTML = `
                    <div class="reader-header">
                        <div class="reader-chapter-number">${chapter.number}</div>
                        <h1 class="reader-chapter-title">${chapter.title}</h1>
                    </div>
                    <div class="reader-content">${paragraphs}</div>
                    <div class="reader-nav">
                        <button class="nav-btn" onclick="loadChapter(${index-1})" ${index===0?'disabled':''}>← 上一章</button>
                        <button class="nav-btn" onclick="loadChapter(${index+1})" ${index===chapters.length-1?'disabled':''}>下一章 →</button>
                    </div>
                `;
                
                // 更新侧边栏选中状态
                document.querySelectorAll('.chapter-item').forEach((item, i) => {
                    item.classList.toggle('active', i === index);
                });
                
                window.scrollTo(0, 0);
                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.remove('open');
                }
            } catch (error) {
                reader.innerHTML = '<div style="text-align:center;padding:50px;color:red;">加载失败，请刷新重试</div>';
            }
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
        
        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentChapter > 0) loadChapter(currentChapter - 1);
            if (e.key === 'ArrowRight' && currentChapter < chapters.length - 1) loadChapter(currentChapter + 1);
        });
        
        // 页面加载时获取章节列表
        window.onload = fetchChapterList;
    </script>
</body>
</html>
