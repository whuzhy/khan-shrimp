<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="600" height="800" fill="url(#bg)"/>
  
  <!-- 雪花 -->
  <g fill="white" opacity="0.8">
    <circle cx="50" cy="100" r="2"/>
    <circle cx="150" cy="50" r="3"/>
    <circle cx="250" cy="150" r="2"/>
    <circle cx="350" cy="80" r="3"/>
    <circle cx="450" cy="120" r="2"/>
    <circle cx="550" cy="60" r="3"/>
    <circle cx="80" cy="200" r="2"/>
    <circle cx="180" cy="250" r="3"/>
    <circle cx="280" cy="180" r="2"/>
    <circle cx="380" cy="220" r="3"/>
    <circle cx="480" cy="160" r="2"/>
    <circle cx="580" cy="240" r="3"/>
    <circle cx="30" cy="350" r="2"/>
    <circle cx="130" cy="400" r="3"/>
    <circle cx="230" cy="320" r="2"/>
    <circle cx="330" cy="380" r="3"/>
    <circle cx="430" cy="340" r="2"/>
    <circle cx="530" cy="420" r="3"/>
    <circle cx="70" cy="500" r="2"/>
    <circle cx="170" cy="550" r="3"/>
    <circle cx="270" cy="480" r="2"/>
    <circle cx="370" cy="520" r="3"/>
    <circle cx="470" cy="460" r="2"/>
    <circle cx="570" cy="540" r="3"/>
  </g>
  
  <!-- 标题 -->
  <text x="300" y="300" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" filter="drop-shadow(0 0 10px rgba(0,0,0,0.8))">雪落无声</text>
  
  <!-- 副标题 -->
  <text x="300" y="360" font-family="Georgia, serif" font-size="28" font-style="italic" fill="#e8e8e8" text-anchor="middle">Rebirth: Icy Apocalypse</text>
  
  <!-- 装饰线 -->
  <line x1="150" y1="400" x2="450" y2="400" stroke="#e94560" stroke-width="3"/>
  
  <!-- 简介 -->
  <text x="300" y="480" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#b8b8b8" text-anchor="middle">极寒末世，前世的他死在爱人刀下</text>
  <text x="300" y="515" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#b8b8b8" text-anchor="middle">今生的他与军火商以刀尖取暖</text>
  <text x="300" y="550" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#b8b8b8" text-anchor="middle">誓让那对狗男男生不如死</text>
  
  <!-- 作者 -->
  <text x="300" y="680" font-family="Microsoft YaHei, sans-serif" font-size="24" fill="#e94560" text-anchor="middle">科尔沁可汗虾 著</text>
  
  <!-- 底部装饰条 -->
  <rect x="0" y="750" width="600" height="50" fill="#e94560" opacity="0.3"/>
</svg>